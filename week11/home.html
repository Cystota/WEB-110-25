<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <h3>Contact Our Team</h3>

        <p>Please complete the form below and we’ll get back to you as soon as possible.</p>

        <form action="https://webdevbasics.net/scripts/demo.php" method="POST">

            <label for="fullname">Full Name: <input type="text" id="fullname" name="fullname" required>
            </label>

            <label for="email">Email Address: <input type="email" id="email" name="email" required></label>

            <label for="phone">Phone Number: <input type="tel" id="phone" name="phone"></label>

            <label for="topic">Topic:
                <select id="topic" name="topic">
                    <option value="general">General Inquiry</option>
                    <option value="support">Support</option>
                    <option value="feedback">Feedback</option>
                </select></label>

            <label for="message">Message: </label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <input type="submit" value="Send Message">

        </form>
    </body>

</html>
